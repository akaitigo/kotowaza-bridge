name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install mvdan.cc/gofumpt@latest
      - name: Lint
        run: cd api && golangci-lint run ./...
      - name: Test
        run: cd api && go test -race -count=1 ./...
      - name: Build
        run: cd api && go build -trimpath ./cmd/server

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: cd web && npm ci
      - name: Lint
        run: cd web && npx oxlint . && npx biome check .
      - name: Typecheck
        run: cd web && npx tsc --noEmit
      - name: Test
        run: cd web && npx vitest run --passWithNoTests
      - name: Build
        run: cd web && npx next build
